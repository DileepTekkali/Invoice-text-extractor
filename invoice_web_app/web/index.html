<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Invoice validation, OCR, and extraction web app.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Invoice Scanner">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Invoice Scanner</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root {
      color-scheme: light;
      --bg: #f7fafd;
      --panel: #ffffff;
      --line: #cfe0f7;
      --text: #10233f;
      --muted: #5b708c;
      --primary: #1f6feb;
      --accent: #35b6a8;
      --soft-blue: #e9f3ff;
      --soft-green: #e8faf4;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      font-family: "Segoe UI", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      overflow: hidden;
    }

    #app-loader {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at top left, #ddeaff 0, transparent 32%),
        radial-gradient(circle at top right, #e5faf5 0, transparent 28%),
        linear-gradient(180deg, #fbfdff 0%, #f3f8fd 100%);
      z-index: 9999;
      transition: opacity 360ms ease, visibility 360ms ease;
    }

    #app-loader.loader-hidden {
      opacity: 0;
      visibility: hidden;
    }

    .loader-shell {
      width: min(440px, calc(100vw - 40px));
      text-align: center;
      color: var(--text);
    }

    .loader-stage {
      position: relative;
      height: 320px;
      border-radius: 30px;
      border: 1px solid #dce8f8;
      background:
        radial-gradient(circle at 30% 20%, var(--soft-blue), #f8fbff 50%, #ffffff 100%);
      box-shadow: 0 24px 60px rgba(31, 111, 235, 0.08);
      overflow: hidden;
    }

    .loader-stage::before,
    .loader-stage::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(2px);
      opacity: 0.9;
    }

    .loader-stage::before {
      width: 180px;
      height: 180px;
      top: -40px;
      left: -30px;
      background: var(--soft-blue);
      animation: drift 4.2s ease-in-out infinite;
    }

    .loader-stage::after {
      width: 200px;
      height: 200px;
      right: -60px;
      top: 60px;
      background: var(--soft-green);
      animation: drift 4.8s ease-in-out infinite reverse;
    }

    .doc-chip {
      position: absolute;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .chip-pdf {
      top: 18px;
      right: 18px;
      color: #d95d21;
      background: #fff1e9;
    }

    .chip-img {
      top: 58px;
      right: 56px;
      color: #177d54;
      background: #effbf4;
    }

    .chip-ai {
      left: 18px;
      bottom: 18px;
      color: #6f4fd1;
      background: #f4f1ff;
    }

    .invoice-sheet {
      position: absolute;
      left: 50%;
      top: 50%;
      width: min(220px, calc(100vw - 180px));
      height: 190px;
      transform: translate(-50%, -56%);
      border-radius: 22px;
      background: var(--panel);
      border: 1px solid #cadbf6;
      box-shadow: 0 18px 34px rgba(31, 111, 235, 0.12);
      animation: float 3.2s ease-in-out infinite;
      overflow: hidden;
    }

    .corner {
      position: absolute;
      width: 16px;
      height: 16px;
      border-top: 2px solid var(--primary);
      border-left: 2px solid var(--primary);
    }

    .corner.tr { top: 10px; right: 10px; transform: rotate(90deg); }
    .corner.br { bottom: 10px; right: 10px; transform: rotate(180deg); }
    .corner.bl { bottom: 10px; left: 10px; transform: rotate(270deg); }
    .corner.tl { top: 10px; left: 10px; }

    .sheet-inner {
      padding: 18px;
    }

    .sheet-header,
    .sheet-line,
    .sheet-footer-main,
    .sheet-footer-side {
      border-radius: 999px;
    }

    .sheet-header {
      width: 88px;
      height: 12px;
      background: rgba(31, 111, 235, 0.14);
      margin-bottom: 14px;
    }

    .sheet-line {
      height: 8px;
      background: rgba(191, 211, 244, 0.7);
      margin-bottom: 9px;
    }

    .w-82 { width: 82%; }
    .w-58 { width: 58%; }
    .w-74 { width: 74%; }
    .w-66 { width: 66%; }
    .w-90 { width: 90%; }
    .w-48 { width: 48%; }

    .sheet-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 22px;
    }

    .sheet-footer-main {
      flex: 1;
      height: 28px;
      background: rgba(234, 242, 255, 0.95);
    }

    .sheet-footer-side {
      width: 72px;
      height: 28px;
      background: rgba(31, 111, 235, 0.16);
    }

    .scan-line {
      position: absolute;
      left: 14px;
      right: 14px;
      height: 18px;
      border-radius: 999px;
      background: linear-gradient(
        90deg,
        rgba(31, 111, 235, 0),
        rgba(31, 111, 235, 0.36),
        rgba(94, 234, 212, 0.5),
        rgba(31, 111, 235, 0)
      );
      box-shadow: 0 0 16px rgba(31, 111, 235, 0.22);
      animation: scan 2.2s ease-in-out infinite;
    }

    .loader-title {
      margin: 24px 0 8px;
      font-size: clamp(28px, 5vw, 36px);
      font-weight: 800;
      letter-spacing: -0.03em;
    }

    .loader-copy {
      margin: 0 auto;
      max-width: 340px;
      color: var(--muted);
      line-height: 1.6;
      font-size: 15px;
    }

    .loader-status {
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #dce8f8;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 999px;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      animation: pulse 1.2s ease-in-out infinite;
    }

    @keyframes drift {
      0%, 100% { transform: translate3d(0, 0, 0); }
      50% { transform: translate3d(14px, 10px, 0); }
    }

    @keyframes float {
      0%, 100% { transform: translate(-50%, -56%); }
      50% { transform: translate(-50%, -52%); }
    }

    @keyframes scan {
      0% { top: 28px; }
      50% { top: 136px; }
      100% { top: 28px; }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(0.9); opacity: 0.8; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    @media (max-width: 520px) {
      .loader-stage {
        height: 280px;
      }

      .invoice-sheet {
        width: calc(100vw - 150px);
        max-width: 210px;
      }
    }
  </style>
</head>
<body>
  <div id="app-loader">
    <div class="loader-shell">
      <div class="loader-stage">
        <div class="doc-chip chip-pdf">PDF</div>
        <div class="doc-chip chip-img">IMG</div>
        <div class="doc-chip chip-ai">AI Extract</div>
        <div class="invoice-sheet">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner br"></div>
          <div class="corner bl"></div>
          <div class="sheet-inner">
            <div class="sheet-header"></div>
            <div class="sheet-line w-82"></div>
            <div class="sheet-line w-58"></div>
            <div class="sheet-line w-74"></div>
            <div class="sheet-line w-66"></div>
            <div class="sheet-line w-90"></div>
            <div class="sheet-line w-48"></div>
            <div class="sheet-footer">
              <div class="sheet-footer-main"></div>
              <div class="sheet-footer-side"></div>
            </div>
          </div>
          <div class="scan-line"></div>
        </div>
      </div>
      <h1 class="loader-title">Invoice Scanner</h1>
      <p class="loader-copy">
        Validating uploads, reading invoice text, and preparing your dashboard.
      </p>
      <div class="loader-status">
        <span class="status-dot"></span>
        Loading workspace
      </div>
    </div>
  </div>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const loader = document.getElementById('app-loader');
      if (!loader) return;
      loader.classList.add('loader-hidden');
      window.setTimeout(function () {
        loader.remove();
        document.body.style.overflow = 'auto';
      }, 420);
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
